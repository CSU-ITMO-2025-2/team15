apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:latest
          command: [ 'sh', '-c', "until nc -z {{ .Release.Name }}-postgres 5432; do echo waiting for postgres; sleep 2; done" ]
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [ "python", "app.py" ]
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
          volumeMounts:
            # Монтируем наш диск в папку /data
            - mountPath: /data
              name: shared-data-volume
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - main-app
                      - worker
                      - webui
              topologyKey: "kubernetes.io/hostname"

          # Тут можно добавить livenessProbe / readinessProbe
      volumes:
        # Объявляем диск, ссылаясь на созданный PVC
        - name: shared-data-volume
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-shared-data